name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t my-website:latest ./my_website

      - name: Test Docker Container
        run: |
          docker run -d -p 80:80 --name test-container my-website:latest
          sleep 5
          docker ps | grep test-container